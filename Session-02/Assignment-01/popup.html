<!DOCTYPE html>
<html>
<head>
  <title>ScripVision Settings</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      width: 250px;
      padding: 15px;
      background: #f8fbff;
      color: #333333;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h2 {
      margin: 0 0 15px 0;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      color: transparent;
      background: -webkit-linear-gradient(#0056b3, #00a2ff);
      background: linear-gradient(#0056b3, #00a2ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: #ffffff;
      border: 1px solid rgba(0, 119, 255, 0.15);
      padding: 10px 15px;
      border-radius: 8px;
      box-sizing: border-box;
    }
    .toggle-label {
      font-size: 14px;
      font-weight: 600;
    }
    /* Switch styling */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #cccccc;
      transition: .4s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #0077ff;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
  </style>
</head>
<body>
  <h2>ScripVision</h2>
  <div class="toggle-container">
    <span class="toggle-label">Extension Enabled</span>
    <label class="switch">
      <input type="checkbox" id="toggleExtension" checked>
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
